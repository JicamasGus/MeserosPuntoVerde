        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--fondo); color: var(--texto); padding: 10px; padding-bottom: 90px; }
        
        /* PANTALLA LOGIN */
        #pantalla-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--verde-oscuro); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-box h2 { color: var(--verde-oscuro); margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .login-box button { width: 100%; background: var(--verde-fuerte); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        
        /* PANTALLA APP (Oculta por defecto) */
        #pantalla-app { display: none; }

        /* HEADER Y APP */
        .header { background: var(--verde-oscuro); color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header h2 { font-size: 1.2rem; }
        .btn-logout { background: var(--rojo); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .mesas-container { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; }
        .mesas-container::-webkit-scrollbar { display: none; }
        .btn-mesa { padding: 10px 20px; border: 2px solid var(--verde-fuerte); background: white; color: var(--verde-fuerte); border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .btn-mesa.activa { background: var(--verde-fuerte); color: white; }
        
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .item-menu { background: white; padding: 15px 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; cursor: pointer; border: 1px solid #ddd; display: flex; flex-direction: column; justify-content: center; }
        .item-menu:active { transform: scale(0.95); background: #e8f5e9; }
        .item-menu h3 { font-size: 0.95rem; color: var(--verde-oscuro); margin-bottom: 5px; }
        .item-menu small { color: var(--verde-acento); font-weight: bold; }
        
        .carrito-flotante { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; justify-content: center; z-index: 1000; }
        .btn-enviar { background: var(--verde-fuerte); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; width: 100%; max-width: 500px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-enviar:disabled { background: #9e9e9e; cursor: not-allowed; }
        
        .lista-pedido { margin-bottom: 20px; background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .lista-pedido h3 { color: var(--verde-oscuro); margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; }
        .item-pedido { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .info-ticket { flex-grow: 1; padding-right: 10px; line-height: 1.4; }
        .btn-quitar { color: white; background: var(--rojo); border: none; width: 30px; height: 30px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* MODAL (Oculto en CSS por brevedad) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: flex-end; }
        .modal-content { background: white; border-radius: 15px 15px 0 0; width: 100%; max-width: 500px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        .modal-header { background: var(--verde-oscuro); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-cerrar { background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; }
        .modal-body { padding: 15px; overflow-y: auto; }
        .modal-footer { padding: 15px; background: white; border-top: 1px solid var(--gris-claro); display: flex; justify-content: space-between; align-items: center; }

        .item-ingrediente label { display: flex; align-items: center; gap: 10px; cursor: pointer; flex-grow: 1; font-size: 0.95rem; }
        .precio-extra { color: var(--verde-acento); font-weight: bold; font-size: 0.85rem; }

        .total-modal { font-size: 1.15rem; font-weight: bold; color: var(--verde-oscuro); }

    </style>

            document.getElementById('modal-titulo').innerText = platilloActivoEnModal.nombre;
            
            // Tamaños
            const listaTamanos = document.getElementById('lista-tamanos');
            listaTamanos.innerHTML = '';
            let esPrimerTamano = true;
            for (const [tamano, precio] of Object.entries(platilloActivoEnModal.precios)) {
                const isChecked = esPrimerTamano ? "checked" : "";
                esPrimerTamano = false;
                listaTamanos.innerHTML += `
                    <div class="item-ingrediente">
                        <label><input type="radio" name="tamano-seleccionado" class="radio-tamano" value="${tamano}" data-precio="${precio}" onchange="recalcularTotal()" ${isChecked}> ${tamano}</label>
                        <span class="precio-extra">$${precio}</span>
                    </div>`;
            }

            // Base
            const listaBase = document.getElementById('lista-base');
            listaBase.innerHTML = '';
            platilloActivoEnModal.ingredientesBase.forEach((ing, index) => {
                let nombreIng = typeof ing === 'string' ? ing : ing.nombre;
                let descuento = (nombreIng.includes('Papas') || nombreIng.includes('Cacahuates')) ? 25 : 0;
                let textoDescuento = descuento > 0 ? `<small style="color: var(--rojo); margin-left: 5px;">(-$${descuento})</small>` : '';

                if (typeof ing === 'string') {
                    listaBase.innerHTML += `
                        <div class="item-ingrediente">
                            <label><input type="checkbox" class="check-base" value="${ing}" data-descuento="${descuento}" checked onchange="recalcularTotal()"> ${ing} ${textoDescuento}</label>
                        </div>`;
                } else {
                    const selectId = `base-opt-${index}`;
                    const opcionesHtml = ing.opciones.map(opt => `<option value="${opt}">${opt}</option>`).join('');
                    listaBase.innerHTML += `
                        <div class="item-ingrediente">
                            <label style="flex-grow:0;">
                                <input type="checkbox" class="check-base" value="${ing.nombre}" data-descuento="${descuento}" data-has-options="true" data-select-id="${selectId}" checked onchange="toggleSelectSabor(this, '${selectId}'); recalcularTotal();"> 
                                ${ing.nombre} ${textoDescuento}
                            </label>
                            <select id="${selectId}" class="select-opciones">${opcionesHtml}</select>
                        </div>`;
                }
            });

            // Extras
            const listaExtras = document.getElementById('lista-extras');
            listaExtras.innerHTML = '';
            if (platilloActivoEnModal.ingredientesExtra) {
                platilloActivoEnModal.ingredientesExtra.forEach((ext, index) => {
                    if (!ext.opciones) {
                        listaExtras.innerHTML += `<div class="item-ingrediente"><label><input type="checkbox" class="check-extra" value="${ext.nombre}" data-precio="${ext.precio}" onchange="recalcularTotal()"> ${ext.nombre}</label><span class="precio-extra">+$${ext.precio}</span></div>`;
                    } else {
                        const selectId = `extra-opt-${index}-${Math.random().toString(36).substr(2, 5)}`;
                        const opcionesHtml = ext.opciones.map(opt => `<option value="${opt}">${opt}</option>`).join('');
                        listaExtras.innerHTML += `
                            <div class="item-ingrediente">
                                <label style="flex-grow:0;">
                                    <input type="checkbox" class="check-extra" value="${ext.nombre}" data-precio="${ext.precio}" data-has-options="true" data-select-id="${selectId}" onchange="recalcularTotal(); toggleSelectSabor(this, '${selectId}')"> 
                                    ${ext.nombre}
                                </label>
                                <select id="${selectId}" class="select-opciones" disabled>${opcionesHtml}</select>
                                <span class="precio-extra" style="width:100%; text-align:left; padding-left:30px;">+$${ext.precio}</span>
                            </div>`;
                    }
                });
            }

            recalcularTotal();
            document.getElementById('modal-personalizacion').style.display = 'flex';
        }

        function recalcularTotal() {
            const tamanoSeleccionado = document.querySelector('.radio-tamano:checked');
            let total = tamanoSeleccionado ? parseFloat(tamanoSeleccionado.getAttribute('data-precio')) : 0;
            
            document.querySelectorAll('.check-extra:checked').forEach(cb => { total += parseFloat(cb.getAttribute('data-precio')); });
            document.querySelectorAll('.check-base:not(:checked)').forEach(cb => { total -= parseFloat(cb.getAttribute('data-descuento')) || 0; });
            
            if (total < 0) total = 0;
            document.getElementById('modal-precio-total').innerText = total;
        }

        function confirmarPlatillo() {
            const tamanoSeleccionado = document.querySelector('.radio-tamano:checked').value;
            const precioCalculado = parseFloat(document.getElementById('modal-precio-total').innerText);
            
            const baseQuitados = [];
            const baseElegidos = [];
            document.querySelectorAll('.check-base').forEach(cb => {
                const nombre = cb.value;
                if (!cb.checked) { baseQuitados.push(nombre); } 
                else if (cb.hasAttribute('data-has-options')) {
                    const selectId = cb.getAttribute('data-select-id');
                    const sabor = document.getElementById(selectId).value;
                    baseElegidos.push(`${nombre} (${sabor})`);
                }
            });

            const extrasAgregados = [];
            document.querySelectorAll('.check-extra:checked').forEach(cb => {
                let nombre = cb.value;
                if (cb.hasAttribute('data-has-options')) {
                    const selectId = cb.getAttribute('data-select-id');
                    const sabor = document.getElementById(selectId).value;
                    nombre += ` (${sabor})`;
                }
                extrasAgregados.push(nombre);
            });

            let stringTicket = `<b>${platilloActivoEnModal.nombre}</b> <span style="color:#2e7d32; font-weight:bold;">[${tamanoSeleccionado}]</span>`;
            if (baseElegidos.length > 0) stringTicket += `<br><small style="color:#444;">✔️ Sabores: ${baseElegidos.join(', ')}</small>`;
            if (baseQuitados.length > 0) stringTicket += `<br><small style="color:#d32f2f;">❌ Sin: ${baseQuitados.join(', ')}</small>`;
            if (extrasAgregados.length > 0) stringTicket += `<br><small style="color:#1976d2;">➕ Extras: ${extrasAgregados.join(', ')}</small>`;

            pedidoActual.push({ textoRenderizado: stringTicket, precio: precioCalculado });
            actualizarVistaPedido();
            cerrarModal();
        }

        function quitarDelPedido(index) {
            pedidoActual.splice(index, 1);
            actualizarVistaPedido();
        }

        function actualizarVistaPedido() {
            const divItems = document.getElementById('items-pedido');
            divItems.innerHTML = '';
            totalCuenta = 0;
            
            if(pedidoActual.length === 0) {
                divItems.innerHTML = '<p style="color:#999; font-size:0.9rem;">El pedido está vacío.</p>';
                document.getElementById('titulo-pedido').innerHTML = `Pedido ${mesaSeleccionada} <span id="total-cuenta" style="color:var(--verde-acento);">$0.00</span>`;
                return;
            }

            pedidoActual.forEach((item, index) => {
                totalCuenta += item.precio;
                divItems.innerHTML += `
                    <div class="item-pedido">
                        <div class="info-ticket">${item.textoRenderizado}</div>
                        <div style="margin-right:15px; font-weight:bold; color:var(--verde-acento);">$${item.precio}</div>
                        <button class="btn-quitar" onclick="quitarDelPedido(${index})">✖</button>
                    </div>`;
            });
            document.getElementById('titulo-pedido').innerHTML = `Pedido ${mesaSeleccionada} <span id="total-cuenta" style="color:var(--verde-acento);">$${totalCuenta.toFixed(2)}</span>`;
        }

        async function enviarACocina() {
            if(pedidoActual.length === 0) { alert("Selecciona al menos un platillo."); return; }
            
            const btn = document.getElementById('btn-enviar');
            btn.innerText = "⏳ Enviando...";
            btn.disabled = true;

            try {
                const itemsParaCocina = pedidoActual.map(p => p.textoRenderizado);
                await db.collection("comandas").add({
                    mesa: mesaSeleccionada,
                    items: itemsParaCocina,
                    hora: new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }),
                    estado: "pendiente",
                    timestamp: Date.now(),
                    total: totalCuenta
                });
                
                alert(`✅ Comanda enviada. Total: $${totalCuenta.toFixed(2)}`);
                pedidoActual = [];
                actualizarVistaPedido();
            } catch (error) {
                console.error("Detalle del error:", error);
                alert("❌ Falló el envío. Verifica tu conexión.");
            } finally {
                btn.innerText = "Enviar a Cocina 👨‍🍳";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
